<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/fonts/work-sans.css">
    <link rel="stylesheet" href="/fonts/droid-sans-mono.css">
    <style>
        input[type="text"] {
            all: initial;
            font-size: 32px;
            font-weight: 400;
            font-family: Droid Sans Mono;
            width: 32px;
            height: 44px;
            color: #2f6fcf;
            display: block;
            text-align: center;
            caret-color: transparent;
        }
        main {
            text-align: center;
        }
        .underscore {
            padding-bottom: 15px;
            border-bottom: 3px solid #999999;
            margin-left: 10px;
            margin-right: 10px;
        }
        iframe {
            border: none;
            width: 100%;
            height: 100vh;
        }
        body {
            height: 100vh;
            overflow: hidden;
            width: 100%;
        }
        form {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            justify-content: center;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('input[type="text"]').forEach((el) => {
                el.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace') {
                        e.target.value = '';
                        const tindex = +e.target.tabIndex;
                        if (tindex > 1) {
                            document.querySelector('input[name="' + ('clarissa-' + (tindex - 1)) + '"]')?.focus();
                        }
                    }
                    if (e.key.length === 1) {
                        e.target.value = e.key;
                        e.preventDefault();
                        const tindex = +e.target.tabIndex;
                        if (tindex < 14) {
                            document.querySelector('input[name="' + ('clarissa-' + (tindex + 1)) + '"]')?.focus();
                        }
                    }
                    if (e.key === 'Enter') {
                        let name = '';
                        for (const idx of [...Array(14).keys()]) {
                            name += document.querySelector('input[name="clarissa-' + (1 + idx) + '"]').value;
                        }
                        const fd = new FormData();
                        fd.append('clarissa', name);
                        fetch('/api/v0/clarissa/', {
                            'method': 'post',
                            'body': fd,
                        }).then(r => r.json()).then(j => {
                            if (j.success) {
                                window.location.href = j.content;
                            } else {
                                const cc = document.getElementById('clarissa-content');
                                cc.removeChild(document.getElementById('clarissa-form'));
                                const h2 = document.createElement('h2');
                                h2.classList.add('rust');
                                h2.appendChild(document.createTextNode(j.content));
                                cc.appendChild(h2);
                            }
                        });
                    }
                });
            });
            document.querySelector('input[name="clarissa-1"]').focus();
        });
    </script>
</head>
<body>
    <main>
        <h1 class="rust">
            Who are you?
        </h1>
        <div id="clarissa-content">
            <form id="clarissa-form">
                <div class="underscore"><input type="text" maxlength="1" tabindex="1" name="clarissa-1"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="2" name="clarissa-2"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="3" name="clarissa-3"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="4" name="clarissa-4"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="5" name="clarissa-5"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="6" name="clarissa-6"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="7" name="clarissa-7"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="8" name="clarissa-8"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="9" name="clarissa-9"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="10" name="clarissa-10"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="11" name="clarissa-11"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="12" name="clarissa-12"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="13" name="clarissa-13"></div>
                <div class="underscore"><input type="text" maxlength="1" tabindex="14" name="clarissa-14"></div>
            </form>
        </div>
    </main>
</body>
</html>
